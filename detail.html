<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BaconCakeOfficial.com</title>
    <link rel="stylesheet" href="styles.css?v=20260714-2" />
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="index.html" aria-label="BaconCakeOfficial.com home">
          <img src="assets/team-icon.png" alt="BaconCake logo" />
          <span data-setting="brandName">BaconCakeOfficial.com</span>
        </a>
        <nav class="main-nav" id="sectionNav" aria-label="Section menu"></nav>
        <button class="root-button" id="adminOpen" type="button">ADMIN</button>
      </header>

      <main>
        <section class="detail-section" id="detailView" aria-live="polite"></section>
      </main>
    </div>

    <dialog class="admin-dialog" id="adminDialog">
      <form method="dialog" id="adminLoginForm">
        <button class="close-button" id="adminDialogClose" type="button" aria-label="Close">×</button>
        <h2>Admin Login</h2>
        <p>Sign in with an admin account to open the editor.</p>
        <input id="adminEmail" type="email" placeholder="Email" autocomplete="username" />
        <input id="adminPassword" type="password" placeholder="Password" autocomplete="current-password" />
        <button class="primary-action" type="submit">Open Admin</button>
        <small id="adminLoginMessage"></small>
      </form>
    </dialog>

    <script src="supabase-config.js?v=20260621-7"></script>
    <script src="site.js?v=20260714-1"></script>
    <script src="detail.js?v=20260707-3"></script>
  </body>
</html>
