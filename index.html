<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BaconCakeOfficial.com</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="#home" aria-label="BaconCakeOfficial.com 홈">
          <img src="assets/team-icon.png" alt="BaconCake 로고" />
          <span data-setting="brandName">BaconCakeOfficial.com</span>
        </a>
        <nav class="main-nav" aria-label="주요 메뉴">
          <a href="#news" data-setting="noticeNavLabel">공지사항</a>
          <a href="#studio">스튜디오</a>
        </nav>
        <button class="root-button" id="adminOpen" type="button">ADMIN</button>
      </header>

      <main id="home">
        <section class="hero">
          <div class="hero-copy">
            <p class="eyebrow" data-setting="heroEyebrow">BaconCake Studio · Official</p>
            <h1 data-setting="heroTitle">BaconCake</h1>
            <p data-setting="heroDescription">
              BaconCake는 작고 선명한 아이디어를 게임, 웹, 커뮤니티 경험으로 만드는
              개발사입니다.
            </p>
            <div class="hero-actions">
              <a class="primary-action" href="#news" data-setting="primaryCta">공지사항 보기</a>
              <a class="secondary-action" href="#studio" data-i18n="studioIntroCta">스튜디오 소개</a>
            </div>
          </div>
        </section>

        <section class="section-grid" id="news">
          <div class="section-heading">
            <p class="eyebrow" data-setting="noticeEyebrow">Official Board</p>
            <h2 data-setting="noticeTitle">공지사항</h2>
          </div>
          <div class="notice-list" id="noticeList" aria-live="polite"></div>
        </section>

        <section class="studio-section" id="studio">
          <div class="section-heading">
            <p class="eyebrow" data-setting="studioEyebrow">Studio Notes</p>
            <h2 data-setting="studioTitle">무엇을 만드는가</h2>
          </div>
          <div class="studio-grid" id="studioGrid"></div>
        </section>

        <div id="customSections"></div>
      </main>
    </div>

    <dialog class="admin-dialog" id="adminDialog">
      <form method="dialog" id="adminLoginForm">
        <button class="close-button" id="adminDialogClose" type="button" aria-label="닫기">×</button>
        <h2 data-i18n="adminAccessTitle">Admin Access</h2>
        <p data-i18n="adminAccessBody">관리자 계정으로 로그인하면 편집 화면으로 이동합니다.</p>
        <input id="adminEmail" type="email" placeholder="이메일" autocomplete="username" data-i18n-placeholder="adminEmailPlaceholder" />
        <input id="adminPassword" type="password" placeholder="비밀번호" autocomplete="current-password" data-i18n-placeholder="adminPasswordPlaceholder" />
        <button class="primary-action" type="submit" data-i18n="adminMove">관리자 이동</button>
        <small id="adminLoginMessage"></small>
      </form>
    </dialog>

    <script src="supabase-config.js"></script>
    <script src="site.js"></script>
  </body>
</html>
