<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BaconCake Root Console</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="admin-page">
    <div class="site-shell admin-shell">
      <header class="topbar">
        <a class="brand" href="index.html" aria-label="BaconCakeOfficial.com 일반 사이트로 이동">
          <img src="assets/team-icon.png" alt="BaconCake 로고" />
          <span>Root Console</span>
        </a>
        <nav class="main-nav" aria-label="관리 메뉴">
          <a href="index.html">일반 사이트</a>
          <a href="#noticeEditor">공지 관리</a>
          <a href="#studioEditor">스튜디오</a>
          <a href="#sectionEditor">섹션</a>
        </nav>
        <button
          class="root-button"
          id="adminLogout"
          type="button"
        >
          LOGOUT
        </button>
      </header>

      <main>
        <section class="root-console" id="rootConsole">
          <div class="section-heading">
            <p class="eyebrow">Admin Only</p>
            <h1>사이트 편집</h1>
          </div>

          <form class="admin-panel" id="settingsForm">
            <div class="panel-title">
              <span>사이트 문구</span>
              <button id="resetSettings" type="button">기본값</button>
            </div>
            <div class="settings-grid">
              <label>
                상단 제목
                <input id="brandName" type="text" required />
              </label>
              <label>
                주소/타이틀
                <input id="siteTitle" type="text" required />
              </label>
              <label>
                히어로 작은 글씨
                <input id="heroEyebrow" type="text" required />
              </label>
              <label>
                메인 제목
                <input id="heroTitle" type="text" required />
              </label>
              <label class="wide-field">
                소개 문구
                <textarea id="heroDescription" rows="3" required></textarea>
              </label>
              <label>
                버튼 문구
                <input id="primaryCta" type="text" required />
              </label>
              <label>
                공지 상단 글씨
                <input id="noticeEyebrow" type="text" required />
              </label>
              <label>
                공지 제목
                <input id="noticeTitle" type="text" required />
              </label>
              <label>
                메뉴 공지 이름
                <input id="noticeNavLabel" type="text" required />
              </label>
              <label>
                스튜디오 작은 글씨
                <input id="studioEyebrow" type="text" required />
              </label>
              <label>
                스튜디오 제목
                <input id="studioTitle" type="text" required />
              </label>
            </div>
            <button class="primary-action" type="submit">사이트 문구 저장</button>
          </form>

          <form class="admin-panel" id="studioForm">
            <div class="panel-title">
              <span id="studioEditor">스튜디오 노트</span>
              <button id="clearStudioNotes" type="button">노트 전체 삭제</button>
            </div>
            <div class="settings-grid">
              <label>
                번호
                <input id="studioNoteNumber" type="text" placeholder="예: 01" required />
              </label>
              <label>
                제목
                <input id="studioNoteTitle" type="text" placeholder="예: Game Development" required />
              </label>
              <label class="wide-field">
                설명
                <textarea id="studioNoteBody" rows="8" placeholder="스튜디오 노트 설명을 작성하세요." required></textarea>
              </label>
              <label class="wide-field">
                첨부 파일
                <input id="studioNoteMedia" type="file" accept="image/*,video/*,audio/*,application/pdf" multiple />
                <small>이미지, 동영상, 오디오, PDF를 여러 개 첨부할 수 있습니다.</small>
              </label>
            </div>
            <div class="form-actions">
              <button class="primary-action" id="submitStudioNote" type="submit">노트 등록</button>
              <button class="secondary-action hidden" id="cancelStudioEdit" type="button">수정 취소</button>
            </div>
          </form>

          <form class="admin-panel" id="postForm">
            <div class="panel-title">
              <span id="noticeEditor">공지 작성</span>
              <button id="clearPosts" type="button">공지 전체 삭제</button>
            </div>
            <label>
              제목
              <input id="postTitle" type="text" placeholder="예: BaconCake 공식 페이지 오픈" required />
            </label>
            <label>
              내용
              <textarea id="postBody" rows="10" placeholder="방문자에게 보여줄 공지 내용을 작성하세요." required></textarea>
            </label>
            <label>
              첨부 파일
              <input id="postMedia" type="file" accept="image/*,video/*,audio/*,application/pdf" multiple />
              <small>이미지, 동영상, 오디오, PDF를 여러 개 첨부할 수 있습니다.</small>
            </label>
            <div class="form-actions">
              <button class="primary-action" id="submitPost" type="submit">글 등록</button>
              <button class="secondary-action hidden" id="cancelEdit" type="button">수정 취소</button>
            </div>
          </form>

          <form class="admin-panel" id="sectionForm">
            <div class="panel-title">
              <span id="sectionEditor">섹션 만들기</span>
              <button id="cancelSectionEdit" class="secondary-action hidden" type="button">수정 취소</button>
            </div>
            <div class="settings-grid">
              <label>
                작은 글씨
                <input id="sectionEyebrow" type="text" placeholder="예: Dev Log" required />
              </label>
              <label>
                섹션 제목
                <input id="sectionTitle" type="text" placeholder="예: 개발 일지" required />
              </label>
              <label>
                형태
                <select id="sectionLayout" required>
                  <option value="article">작문형</option>
                  <option value="album">앨범형</option>
                </select>
              </label>
            </div>
            <button class="primary-action" id="submitSection" type="submit">섹션 등록</button>
          </form>

          <div class="admin-panel">
            <div class="panel-title">
              <span>섹션 목록</span>
            </div>
            <div class="section-admin-list" id="sectionList"></div>
          </div>

          <form class="admin-panel" id="customEntryForm">
            <div class="panel-title">
              <span>섹션 콘텐츠 작성</span>
              <button id="cancelEntryEdit" class="secondary-action hidden" type="button">수정 취소</button>
            </div>
            <div class="settings-grid">
              <label>
                섹션 선택
                <select id="entrySection" required></select>
              </label>
              <label>
                번호/라벨
                <input id="entryNumber" type="text" placeholder="앨범형에서 예: 01" />
              </label>
              <label>
                제목
                <input id="entryTitle" type="text" placeholder="콘텐츠 제목" required />
              </label>
              <label class="wide-field">
                내용
                <textarea id="entryBody" rows="10" placeholder="긴 글도 제한 없이 작성할 수 있습니다." required></textarea>
              </label>
              <label class="wide-field">
                첨부 파일
                <input id="entryMedia" type="file" accept="image/*,video/*,audio/*,application/pdf" multiple />
                <small>이미지, 동영상, 오디오, PDF를 여러 개 첨부할 수 있습니다.</small>
              </label>
            </div>
            <button class="primary-action" id="submitEntry" type="submit">콘텐츠 등록</button>
          </form>
        </section>

        <section class="section-grid">
          <div class="section-heading">
            <p class="eyebrow">Preview</p>
            <h2>공지 미리보기</h2>
          </div>
          <div class="notice-list" id="noticeList" aria-live="polite"></div>
        </section>

        <section class="studio-section">
          <div class="section-heading">
            <p class="eyebrow" data-setting="studioEyebrow">Studio Notes</p>
            <h2 data-setting="studioTitle">무엇을 만드는가</h2>
          </div>
          <div class="studio-grid" id="studioGrid"></div>
        </section>

        <div id="customSections"></div>
      </main>
    </div>

    <script src="supabase-config.js"></script>
    <script src="site.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
