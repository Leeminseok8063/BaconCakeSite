<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BaconCake 관리자 콘솔</title>
    <link rel="stylesheet" href="styles.css?v=20260621-7" />
  </head>
  <body class="admin-page">
    <div class="site-shell admin-shell">
      <header class="topbar">
        <a class="brand" href="index.html" aria-label="BaconCakeOfficial.com 일반 사이트로 이동">
          <img src="assets/team-icon.png" alt="BaconCake 로고" />
          <span>관리자 콘솔</span>
        </a>
        <nav class="main-nav" aria-label="관리 메뉴">
          <a href="index.html">일반 사이트</a>
          <a href="#sectionEditor">섹션</a>
          <a href="#entryEditor">글</a>
          <a href="#preview">미리보기</a>
        </nav>
        <button class="root-button" id="adminLogout" type="button">LOGOUT</button>
      </header>

      <main>
        <section class="root-console" id="rootConsole">
          <div class="section-heading">
            <p class="eyebrow">관리자 전용</p>
            <h1>사이트 편집</h1>
          </div>

          <form class="admin-panel" id="settingsForm">
            <div class="panel-title">
              <span>기본 문구</span>
              <button id="resetSettings" type="button">기본값</button>
            </div>
            <div class="settings-grid">
              <label>
                상단 제목
                <input id="brandName" type="text" required />
              </label>
              <label>
                주소/타이틀
                <input id="siteTitle" type="text" required />
              </label>
              <label>
                히어로 작은 글씨
                <input id="heroEyebrow" type="text" required />
              </label>
              <label>
                메인 제목
                <input id="heroTitle" type="text" required />
              </label>
              <label class="wide-field">
                소개 문구
                <textarea id="heroDescription" rows="3" required></textarea>
              </label>
            </div>
            <button class="primary-action" type="submit">기본 문구 저장</button>
          </form>

          <form class="admin-panel" id="sectionForm">
            <div class="panel-title">
              <span id="sectionEditor">섹션 만들기</span>
              <button id="cancelSectionEdit" class="secondary-action hidden" type="button">수정 취소</button>
            </div>
            <div class="settings-grid">
              <label>
                작은 글씨
                <input id="sectionEyebrow" type="text" placeholder="예: Legal" />
              </label>
              <label>
                섹션 제목
                <input id="sectionTitle" type="text" placeholder="예: 개인정보처리" required />
              </label>
              <label>
                주소 이름
                <input id="sectionSlug" type="text" placeholder="예: privacy" />
              </label>
              <label>
                형태
                <select id="sectionLayout" required>
                  <option value="article">작문형</option>
                  <option value="album">앨범형</option>
                </select>
              </label>
            </div>
            <button class="primary-action" id="submitSection" type="submit">섹션 등록</button>
          </form>

          <div class="admin-panel">
            <div class="panel-title">
              <span>섹션 목록</span>
            </div>
            <div class="section-admin-list" id="sectionList"></div>
          </div>

          <form class="admin-panel" id="customEntryForm">
            <div class="panel-title">
              <span id="entryEditor">섹션 글 작성</span>
              <button id="cancelEntryEdit" class="secondary-action hidden" type="button">수정 취소</button>
            </div>
            <div class="settings-grid">
              <label>
                섹션 선택
                <select id="entrySection" required></select>
              </label>
              <label>
                번호/라벨
                <input id="entryNumber" type="text" placeholder="앨범형에서 예: 01" />
              </label>
              <label>
                제목
                <input id="entryTitle" type="text" placeholder="예: 개인정보 처리방침" required />
              </label>
              <label>
                상세 주소 이름
                <input id="entrySlug" type="text" placeholder="예: privacy-policy" />
              </label>
              <label class="wide-field">
                내용
                <textarea id="entryBody" rows="14" placeholder="긴 글도 제한 없이 작성할 수 있습니다." required></textarea>
              </label>
              <label class="wide-field">
                첨부 파일
                <input id="entryMedia" type="file" accept="image/*,video/*,audio/*,application/pdf" multiple />
                <small>이미지, 동영상, 오디오, PDF를 여러 개 첨부할 수 있습니다.</small>
              </label>
            </div>
            <button class="primary-action" id="submitEntry" type="submit">글 등록</button>
          </form>
        </section>

        <section id="preview">
          <div class="section-heading">
            <p class="eyebrow">미리보기</p>
            <h2>일반 사이트 미리보기</h2>
          </div>
          <div id="customSections"></div>
        </section>
      </main>
    </div>

    <script src="supabase-config.js?v=20260621-7"></script>
    <script src="site.js?v=20260621-7"></script>
    <script src="admin.js?v=20260621-7"></script>
  </body>
</html>
